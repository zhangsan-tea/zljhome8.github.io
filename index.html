                <h1>一、为什么要养龙虾</h1>

                <p>核心：常规 AI 更像一个入口或工具，龙虾更像一个人。</p>

                <h1>二、工具选型</h1>
                
                <p><strong>总原则</strong>：如果有省事的办法，就不要用复杂的办法——当然前提是你对它的安全性有一定的了解。技术的事要么用一键安装的产品省心，要么请技术团队支持。尽量不要自己在技术层面纠结太多，否则消耗的心力比省下来的钱还多。</p>

                <h2>核心落地三要素（v1.9 新增）</h2>
                <p>推动 AI 助手落地，有三个最核心的问题必须回答清楚，它们构成了用户接受度的"死亡三角"：</p>

                    <li><strong>费用（能不能活下去？）</strong>：Token 消耗失控是劝退新手的最大障碍。必须通过"理清再问"、"工作区大扫除"、"/new 三步法"等策略进行成本优化，将单次任务成本降至人工成本的十分之一以下。手搓了个 skill，目测还比较好用。</li>
                    <li><strong>能干什么（值不值得折腾？）</strong>：打破"高级聊天框"的错觉，找到真正的业务自动化杠杆。核心在于将隐性经验显性化（变成 Prompt），将人工流程自动化（变成 Skill），代替人工处理高频、繁琐、跨系统的信息流转。</li>
                </ul>

                <h2>2.1 产品选择过程</h2>
                <ul>
                    <li><strong>开源版 OpenClaw</strong>：按教程装，5分钟装完，稳定性差，报错不断</li>
                    <li><strong>EasyClaw</strong>：一键安装，界面清晰，解决了配置/稳定性/海外模型接入问题。但模型锁死，成本失控——每天20美金，烧不起</li>

                    <li><strong>目前使用</strong>：开源版龙虾 + macmini，以及内网工具：workbuddy、box、opencalw 内网版、knot、企微智能机器人</li>

                    <li><strong>当前限制</strong>：无法便捷配置多 Agent</li>

                <h2>2.3 决策五因素（按优先级）</h2>
                <ul>
                    <li><strong>安全性</strong>——数据隐私、权限控制</li>

                <p>SOUL.md、USER.md、IDENTITY.md 这些文件都是普通文本格式，不是黑箱，可以直接用编辑器打开修改。想调整语气、改规则、加记忆，直接编辑文件就行，不需要通过对话去"教"它——有时候直接改比反复说清楚快得多。</p>

                <h2>2.7 Codebuddy / Workbuddy：急救医生</h2>
                <p>Codebuddy 和 Workbuddy 是龙虾最重要的外援工具：</p>

                    <li>基于 Codebuddy，编程能力很强，对本地电脑操控能力也很强，一些编程任务还是推荐用 Codebuddy，或者 Workbuddy，比龙虾可控性更强。</li>
                </ul>

                <h2>2.8 多产品体验 vs. 集中精力</h2>
                <p>前期可以多体验几个产品，多了解不同工具的能力和边界。但后期建议<strong>集中精力在一两个工具上</strong>深挖，不要每样都蜻蜓点水。体验是探索，集中才是生产力。</p>

                <h2>2.9 产品选择维度</h2>
                <p><strong>维度一：本机 vs 云端</strong></p>
                <p><strong>本地部署：</strong></p>
                <ul>
                    <li><strong>本地电脑 + 开源 OpenClaw</strong>：OpenClaw（开源版） - 数据本地可控，可深度定制，权限全开放；需要一定调试能力</li>
                    <li><strong>本地电脑 + 一键封装版</strong>：EasyClaw、腾讯 QCloud 等 - 一键安装，界面友好，封装模型，计费方式统一；省去安装调试心力</li>
                </ul>
                <p><strong>内网部署补充：</strong></p>
                <ul>
                    <li>可选择内网本地部署的开源模型，<strong>免费</strong></li>
                    <li>其他内网模型成本比市面更低，部分可能需要相关审批流程</li>
                </ul>

                <p><strong>维度二：外网 vs 内网</strong></p>
                <ul>
                    <li><strong>内网</strong>：OpenClaw 内网版 - MC0 上长期稳定运行；与 IWiki、KM、KNOT、Tapd 等打通方便；与互联网相对隔绝，安全性好</li>
                    <li><strong>内网</strong>：Workbuddy - Codebuddy 的龙虾版；AICoding 能力强，对本地操控能力强；权限隔离好，安全性好；涉及敏感信息和复杂任务优先推荐</li>
                    <li><strong>内网</strong>：KNOT - （待补充）；与企微结合非常方便；背后可结合知识库</li>
                    <li><strong>内网</strong>：Box - https://box-ai.woa.com；能连通外网和内网；可方便检索浏览内网知识库；浏览器操控能力强</li>
                    <li><strong>外网</strong>：开源 OpenClaw - github.com；完全开源，可深度定制</li>
                    <li><strong>外网</strong>：EasyClaw 等一键装 - （待补充）；省去安装调试心力，界面友好</li>
                </ul>
                <p>💡 <strong>云端 vs 本地的权衡（v1.9补充）</strong><br>
                云端产品（如部分内网/外网一键封装版）拥有<strong>相对的安全性保障</strong>，免去了配置烦恼；但代价是<strong>享受不了本地安装那种对权限随心所欲的修改和调整</strong>。这是便利性与可控性之间的必然取舍。</p>

                <h2>2.10 模型选择</h2>
                <p><strong>中文编辑处理</strong>：国内头部模型（GLM-5、MiniMax2.7 等）目前表现不错，与国外大模型没有巨大差距。</p>
                <p><strong>Deep Research / 超长文本 / 多模态识别</strong>：国内外旗舰模型有明显差距，国外顶级模型在这几块能力更强。</p>
                <p><strong>基本原则</strong>：需求极其简单时随便用，严重依赖模型能力时用最好的。<strong>稍复杂一点的任务，真的是模型高一寸，工程胜一丈。</strong></p>

                <h2>2.11 Token 消耗优化与成本控制（v1.8扩展）</h2>
                <p>零散提问特别消耗 Token（每次提问都要调动 Memory）。以下是核心省钱经验：</p>
                <ul>
                    <li><strong>理清再问</strong>：很复杂的事情，比如一个产品需求的梳理，先拆成几个部分。找个ai对话框把需求先聊清楚，理顺了再抛给龙虾。</li>
                    <li><strong>术业有专攻</strong>：不是所有事都要找龙虾。纯查询类的简单信息，用传统的 AI 对话框（ChatGPT/Gemini Web）效果更好且不费龙虾的 Token。</li>
                    <li><strong>定时用量审计</strong>：设置一个每天的定时任务，让它统计各个助手和整体的 Token 使用量。如果发现某一块量特别高，直接问它原因和解决办法。</li>
                    <li><strong>善用命令</strong>： 
                        <ul>
                            <li>/new：开启全新对话，最省 Token，但是要注意对话的延续性，需要提前做点事情</li>
                            <li>/reset：清空短期上下文</li>
                            <li>/compact：压缩当前会话</li>
                            <li>/models:   查看当前使用的模型</li>
                            <li>/models: 查看当前可用模型，换模型，有些故障或者功能的缺陷，比如说图片识别不了，需要切换模型。</li>
                            <li>/status： 查看当前状态，有包括模型、上下文占用量等多方面的信息。</li>
                        </ul>
                    </li>
                    <li><strong>定期执行"工作区大扫除"（v1.9新增避坑指南）</strong>： 
                        <ul>
                            <li><strong>为什么会突然极度消耗 Token？</strong> OpenClaw 的机制是：只要你在这个助手的根目录（workspace-xxx/）放了 .md 文件，<strong>每次对话都会把它们当作系统背景塞给大模型</strong>。</li>
                            <li><strong>真实教训</strong>：如果在根目录堆积了大量的历史调研报告、草稿或开发文档，哪怕你只对助手说一句"你好"，它起步就可能耗掉几万个 Input Token。</li>
                            <li><strong>解决绝招</strong>：保持助手工作区根目录<strong>绝对干净</strong>（只留 SOUL.md、IDENTITY.md、USER.md 等核心预设）。其余所有过程文件、参考资料，<strong>统统新建一个 archive/（归档）或者 docs/ 文件夹塞进去</strong>。一旦移入子文件夹，OpenClaw 就不会默认硬塞进上下文了。</li>
                            <li>已经手搓了个定期清理多余文件，减少 Token 消耗的skills，目前看还比较好用。</li>
                        </ul>
                    </li>
                    <li><strong>便宜渠道的代价</strong>：一些特殊渠道很便宜，但要注意稳定性差，尤其是一些中转服务，有时回复很慢，关键任务慎用。</li>
                    <li><strong>轻量级本地模型（v1.9启示）</strong>：正如《OpenClaw，AI圈的Windows时刻》<a href="https://mp.weixin.qq.com/s/kYaWIbN3zT8GaY8dXHMUkA" target="_blank">文中所述</a>，未来当技术支持时，像 Mac mini 这种本地设备就可以部署不错的轻量级模型。把相当一部分不太复杂的要求交给<strong>本地模型</strong>执行，能省下巨额 API 费用。</li>
                </ul>

                <h1>七、安全</h1>

                <ul>

            chapter11: `
                <h1>十一、基本原则汇总（v1.8 重大扩展）</h1>
                
                <p>"很多时候不是做不到，而是想不到，或者说不敢想。多年的规训让我们的自我审查意识极强，甚至潜入到潜意识中间。"</p>

                <h2>11.1 使用 AI 需要有"往后退一步"的意识</h2>
                <p>放弃完美提问，不要想一次性说清楚。慢就是快。</p>
                <ul>
                    <li><strong>方向不清时退一步</strong>：写文章没想明白路径时，先问 AI 出个框架建议，再多轮推敲；研究方法不清晰时，请它整理已有方式。</li>
                    <li><strong>遇到卡点时退一步</strong>：不知道用什么工具去问它，工具不会用去问它怎么用，卡住了问怎么解决。</li>
                    <li><strong>不知怎么提问时退一步</strong>：倒回去问"我该怎么提问？“，或者请它代写提示词（苏格拉底提问法很重要）。不知道该提供什么信息时，先讲大概情况，然后问"你还需要我提供什么？”，别着急让对方输出答案。</li>
                    <li><strong>已有框架时退一步</strong>：哪怕自己已经写了提纲，依然可以请它分析：这个框架的基本逻辑是什么？还要考虑哪些因素？</li>
                </ul>
                <p><strong>核心</strong>：退回到最初的原始意图，一点点把已知和确定的输入给它，同时让它了解你的"不确定"。AI 很强的一点，就是能把散乱的多轮对话最后结构化整理出来。</p>

                <h2>11.2 人的价值重新定位</h2>
                <p>有了 AI 之后，<strong>学习依然重要，但要把人从繁琐的死记硬背中解放出来</strong>.</p>
                <p><strong>人的价值更在于</strong>：发现需求、明确需求、承担责任，以及创造力、好奇心、审美等.</p>

                <h2>11.3 核心方法论摘要</h2>
                <ul>
                    <li><strong>需求和好奇是最基本的驱动力，不推荐系统的学习，信息爆炸，很难坚持下来.</strong></li>
                    <li><strong>工具是助手，人承担最终决策权</strong>——责任不外包</li>
                    <li><strong>意图比流程重要</strong>——讲清楚要什么，而不是强加工作流，个人过往经验不一定能够套用</li>
                    <li><strong>上下文是核心资产</strong>——慢慢积累，重要信息主动存 Memory</li>
                    <li><strong>敢于授权</strong>——"我授权你，自己想办法"，敢于 PUA 龙虾</li>
                    <li><strong>用好模型</strong>——稍复杂任务，模型高一寸，工程胜一丈</li>
                    <li><strong>不要用自己的想法套住模型</strong>——先丢给 AI 看规律，有新发现再叠加</li>
                    <li><strong>结构壳也是能力</strong>——AI 能力的几个层次中，龙虾外面的结构壳（Harness）本身也是极强的能力扩展。其他能力还包括：模型能力，不同模型能力的高低和能力的组合差别很大；外部特定能力（比如音频识别），可以让龙虾自己去寻找</li>
                </ul>
